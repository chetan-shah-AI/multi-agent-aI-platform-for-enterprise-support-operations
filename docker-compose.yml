version: "3.9"

services:
  web:
    build: .
    container_name: enterprise_support_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: enterprise_support_postgres
    environment:
      POSTGRES_DB: enterprise_support
      POSTGRES_USER: enterprise_support_user
      POSTGRES_PASSWORD: enterprise_support_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7
    container_name: enterprise_support_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: