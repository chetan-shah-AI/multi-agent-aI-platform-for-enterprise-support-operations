name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: enterprise_support
          POSTGRES_USER: enterprise_support_user
          POSTGRES_PASSWORD: enterprise_support_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U enterprise_support_user -d enterprise_support"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DEBUG: "True"
      SECRET_KEY: test-secret-key
      DATABASE_NAME: enterprise_support
      DATABASE_USER: enterprise_support_user
      DATABASE_PASSWORD: enterprise_support_password
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest -q